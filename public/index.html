<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Classroom</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
      background: #f1f3f4;
      color: #202124;
    }
    .topbar {
      background: #1a73e8;
      color: white;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .topbar-title {
      font-size: 20px;
      font-weight: 500;
    }
    .content {
      padding: 20px;
      max-width: 900px;
      margin: 0 auto;
    }
    .search-box {
      margin-bottom: 20px;
    }
    .search-box input {
      width: 100%;
      max-width: 500px;
      padding: 10px 12px;
      border-radius: 24px;
      border: 1px solid #dadce0;
      font-size: 14px;
      outline: none;
    }
    .search-box input:focus {
      border-color: #1a73e8;
      box-shadow: 0 0 0 1px #1a73e8;
    }
    .classes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }
    .class-card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 1px 2px rgba(60, 64, 67, 0.3),
        0 1px 3px 1px rgba(60, 64, 67, 0.15);
      overflow: hidden;
      cursor: default;
    }
    .class-header {
      background: #137333;
      color: white;
      padding: 12px;
      font-size: 16px;
      font-weight: 500;
    }
    .class-body {
      padding: 12px;
      font-size: 13px;
      color: #5f6368;
    }
    .status {
      margin-top: 10px;
      font-size: 13px;
      color: #5f6368;
    }
    .status span {
      font-weight: 500;
    }
    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: #5f6368;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-title">Classroom</div>
  </div>

  <div class="content">
    <div class="search-box">
      <input
        id="class-search"
        type="text"
        placeholder="Search for classes"
        autocomplete="off"
      />
    </div>

    <div class="classes-grid">
      <div class="class-card">
        <div class="class-header">Maths 9A</div>
        <div class="class-body">Assignments, quizzes and resources.</div>
      </div>
      <div class="class-card">
        <div class="class-header">English 10B</div>
        <div class="class-body">Reading tasks and writing practice.</div>
      </div>
      <div class="class-card">
        <div class="class-header">Science 8C</div>
        <div class="class-body">Experiments and lesson notes.</div>
      </div>
    </div>

    <div class="status" id="status-text">
      Type to search for classes.
    </div>

    <div class="footer">
      Classroom · For educational use
    </div>
  </div>

  <script>
    (function () {
      const input = document.getElementById("class-search");
      const status = document.getElementById("status-text");
      const SECRET = "googleclassroom";

      input.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          const value = input.value.trim().toLowerCase();
          if (value === SECRET) {
            status.textContent = "Loading classes…";
            window.location.href = "/browse";
          } else if (value.length === 0) {
            status.innerHTML = "Type to search for classes.";
          } else {
            status.innerHTML =
              'No classes found for "<span>' +
              value.replace(/</g, "&lt;") +
              '</span>".';
          }
        }
      });
    })();
  </script>
</body>
</html>

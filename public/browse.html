<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Browser</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .topbar {
      padding: 8px 10px;
      background: #020617;
      display: flex;
      gap: 8px;
      align-items: center;
      border-bottom: 1px solid #1f2937;
    }
    .topbar input {
      flex: 1;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #334155;
      background: #020617;
      color: #e5e7eb;
      font-size: 13px;
      outline: none;
    }
    .topbar button {
      padding: 8px 12px;
      border-radius: 6px;
      border: none;
      background: #38bdf8;
      color: #020617;
      font-weight: 600;
      cursor: pointer;
      font-size: 13px;
    }
    .frame-wrap {
      flex: 1;
      background: #020617;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <input
      id="addr"
      type="text"
      placeholder="Enter address or search"
      autocomplete="off"
    />
    <button id="go-btn">Go</button>
    <button id="back-class">Classes</button>
  </div>
  <div class="frame-wrap">
    <iframe id="view" src="about:blank"></iframe>
  </div>

  <script>
    (function () {
      const addr = document.getElementById("addr");
      const btn = document.getElementById("go-btn");
      const frame = document.getElementById("view");
      const back = document.getElementById("back-class");

      function buildTarget(input) {
        let q = input.trim();
        if (!q) return "";
        if (q.includes(" ") || !q.includes(".")) {
          return "https://www.google.com/search?q=" + encodeURIComponent(q);
        }
        if (!q.startsWith("http://") && !q.startsWith("https://")) {
          q = "https://" + q;
        }
        return q;
      }

      function navigate() {
        const target = buildTarget(addr.value);
        if (!target) return;
        frame.src = "/go?url=" + encodeURIComponent(target);
      }

      btn.addEventListener("click", function () {
        navigate();
      });

      addr.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          navigate();
        }
      });

      back.addEventListener("click", function () {
        window.location.href = "/";
      });
    })();
  </script>
</body>
</html>
